apiVersion: v1
kind: ServiceAccount
metadata:
  name: '{{ .Values.SERVICE_NAME }}'
  namespace: '{{ .Values.NAMESPACE }}'
  annotations:
    helm.sh/hook: "pre-install, pre-upgrade"
    helm.sh/hook-weight: "90"
    helm.sh/hook-delete-policy: "before-hook-creation"
  labels:
    type: m2m
    app.kubernetes.io/part-of: 'Cloud-Core'
    app.kubernetes.io/managed-by: 'saasDeployer'
    deployment.netcracker.com/sessionId: '{{ .Values.DEPLOYMENT_SESSION_ID }}'
{{ if .Values.MONITORING_ENABLED }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: '{{ .Values.SERVICE_NAME }}-monitoring-role'
  labels:
    app.kubernetes.io/part-of: 'Cloud-Core'
    app.kubernetes.io/managed-by: 'saasDeployer'
  annotations:
    helm.sh/hook: "pre-install, pre-upgrade"
    helm.sh/hook-weight: "90"
    helm.sh/hook-delete-policy: "before-hook-creation"
rules:
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["podmonitors"]
    verbs: ["get", "list", "create", "delete", "patch", "update", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: '{{ .Values.SERVICE_NAME }}-monitoring-role'
  namespace: '{{ .Values.NAMESPACE }}'
  annotations:
    helm.sh/hook: "pre-install, pre-upgrade"
    helm.sh/hook-weight: "90"
    helm.sh/hook-delete-policy: "before-hook-creation"
  labels:
    app.kubernetes.io/part-of: 'Cloud-Core'
    app.kubernetes.io/managed-by: 'saasDeployer'
roleRef:
  name: '{{ .Values.SERVICE_NAME }}-monitoring-role'
  apiGroup: rbac.authorization.k8s.io
  kind: Role
subjects:
  - kind: ServiceAccount
    name: '{{ .Values.SERVICE_NAME }}'
    namespace: '{{ .Values.NAMESPACE }}'
{{ end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: '{{ .Values.SERVICE_NAME }}-role'
  annotations:
    helm.sh/hook: "pre-install, pre-upgrade"
    helm.sh/hook-weight: "90"
    helm.sh/hook-delete-policy: "before-hook-creation"
  labels:
    app.kubernetes.io/part-of: 'Cloud-Core'
    app.kubernetes.io/managed-by: 'saasDeployer'
rules:
  - apiGroups: ["netcracker.com"]
    resources: ["facadeservices"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["core.netcracker.com"]
    resources: ["gateways", "gateways/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  {{ if contains "gateway-api-default" .Values.GATEWAY_SYSTEM_TYPE -}}
  - apiGroups: ["gateway.networking.k8s.io"]
    resources: ["httproutes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["gateway.envoyproxy.io"]
    resources:
      - backendtrafficpolicies
      - clienttrafficpolicies
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
    {{end}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: '{{ .Values.SERVICE_NAME }}-role'
  namespace: '{{ .Values.NAMESPACE }}'
  annotations:
    helm.sh/hook: "pre-install, pre-upgrade"
    helm.sh/hook-weight: "90"
    helm.sh/hook-delete-policy: "before-hook-creation"
  labels:
    app.kubernetes.io/part-of: 'Cloud-Core'
    app.kubernetes.io/managed-by: 'saasDeployer'
roleRef:
  name: '{{ .Values.SERVICE_NAME }}-role'
  apiGroup: rbac.authorization.k8s.io
  kind: Role
subjects:
  - kind: ServiceAccount
    name: '{{ .Values.SERVICE_NAME }}'
    namespace: '{{ .Values.NAMESPACE }}'
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: '{{ .Values.SERVICE_NAME }}-edit'
  namespace: '{{ .Values.NAMESPACE }}'
  annotations:
    helm.sh/hook: "pre-install, pre-upgrade"
    helm.sh/hook-weight: "90"
    helm.sh/hook-delete-policy: "before-hook-creation"
  labels:
    app.kubernetes.io/part-of: 'Cloud-Core'
    app.kubernetes.io/managed-by: 'saasDeployer'
subjects:
  - kind: ServiceAccount
    name: '{{ .Values.SERVICE_NAME }}'
    namespace: '{{ .Values.NAMESPACE }}'
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: edit